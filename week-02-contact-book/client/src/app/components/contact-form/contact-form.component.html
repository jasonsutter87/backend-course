<div class="contact-form-page">
  <header class="page-header">
    <button class="back-btn" (click)="cancel()">&#8592; Back</button>
    <h1>{{ isEditMode ? 'Edit Contact' : 'Add Contact' }}</h1>
  </header>

  <div *ngIf="loading" class="loading-state">
    <div class="spinner"></div>
    <p>Loading contact...</p>
  </div>

  <form *ngIf="!loading" class="form-card" [formGroup]="form" (ngSubmit)="onSubmit()">
    <div *ngIf="error" class="error-banner">{{ error }}</div>

    <div class="form-row">
      <div class="form-group">
        <label for="firstName">First Name <span class="required">*</span></label>
        <input
          id="firstName"
          type="text"
          formControlName="firstName"
          placeholder="Jane"
          [class.invalid]="firstNameControl.invalid && firstNameControl.touched"
        />
        <span class="field-error" *ngIf="firstNameControl.invalid && firstNameControl.touched">
          First name is required.
        </span>
      </div>

      <div class="form-group">
        <label for="lastName">Last Name <span class="required">*</span></label>
        <input
          id="lastName"
          type="text"
          formControlName="lastName"
          placeholder="Smith"
          [class.invalid]="lastNameControl.invalid && lastNameControl.touched"
        />
        <span class="field-error" *ngIf="lastNameControl.invalid && lastNameControl.touched">
          Last name is required.
        </span>
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email Address <span class="required">*</span></label>
      <input
        id="email"
        type="email"
        formControlName="email"
        placeholder="jane@example.com"
        [class.invalid]="emailControl.invalid && emailControl.touched"
      />
      <span class="field-error" *ngIf="emailControl.errors?.['required'] && emailControl.touched">
        Email is required.
      </span>
      <span class="field-error" *ngIf="emailControl.errors?.['email'] && emailControl.touched">
        Please enter a valid email address.
      </span>
    </div>

    <div class="form-group">
      <label for="phone">Phone Number</label>
      <input
        id="phone"
        type="tel"
        formControlName="phone"
        placeholder="+1 (555) 000-0000"
      />
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-cancel" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn btn-submit" [disabled]="form.invalid || submitting">
        {{ submitting ? 'Saving...' : (isEditMode ? 'Update Contact' : 'Add Contact') }}
      </button>
    </div>
  </form>
</div>
