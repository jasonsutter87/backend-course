<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">&#9997;</div>
    <h1>Welcome back</h1>
    <p class="auth-subtitle">Sign in to your account to continue</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div *ngIf="error" class="error-banner">{{ error }}</div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          [class.invalid]="emailControl.invalid && emailControl.touched"
        />
        <span class="field-error" *ngIf="emailControl.errors?.['required'] && emailControl.touched">Email is required.</span>
        <span class="field-error" *ngIf="emailControl.errors?.['email'] && emailControl.touched">Enter a valid email.</span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Your password"
          [class.invalid]="passwordControl.invalid && passwordControl.touched"
        />
        <span class="field-error" *ngIf="passwordControl.invalid && passwordControl.touched">Password is required.</span>
      </div>

      <button type="submit" class="btn-submit" [disabled]="form.invalid || submitting">
        {{ submitting ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="auth-switch">
      Don't have an account? <a routerLink="/register">Register</a>
    </p>
  </div>
</div>
