<div class="post-form-page">
  <header class="page-header">
    <button class="back-btn" (click)="cancel()">&#8592; {{ isEditMode ? 'Back to Post' : 'All Posts' }}</button>
    <h1>{{ isEditMode ? 'Edit Post' : 'Write a New Post' }}</h1>
  </header>

  <div *ngIf="loading" class="loading-state">
    <div class="spinner"></div>
    <p>Loading post...</p>
  </div>

  <form *ngIf="!loading" class="form-card" [formGroup]="form" (ngSubmit)="onSubmit()">
    <div *ngIf="error" class="error-banner">{{ error }}</div>

    <div class="form-group">
      <label for="title">Post Title <span class="required">*</span></label>
      <input
        id="title"
        type="text"
        formControlName="title"
        placeholder="Enter a compelling title..."
        [class.invalid]="titleControl.invalid && titleControl.touched"
      />
      <span class="field-error" *ngIf="titleControl.invalid && titleControl.touched">Title is required.</span>
    </div>

    <div class="form-group">
      <label for="content">Content <span class="required">*</span></label>
      <textarea
        id="content"
        formControlName="content"
        placeholder="Write your post here... Use new lines to create paragraphs."
        rows="16"
        [class.invalid]="contentControl.invalid && contentControl.touched"
      ></textarea>
      <span class="field-error" *ngIf="contentControl.invalid && contentControl.touched">Content is required.</span>
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-cancel" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn btn-submit" [disabled]="form.invalid || submitting">
        {{ submitting ? 'Publishing...' : (isEditMode ? 'Update Post' : 'Publish Post') }}
      </button>
    </div>
  </form>
</div>
