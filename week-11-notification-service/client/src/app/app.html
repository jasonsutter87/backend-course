<div class="app-shell">
  <nav class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">&#128276;</span>
      <span class="brand-name">Notification Center</span>
    </div>

    <ul class="nav-list">
      <li>
        <a routerLink="/" routerLinkActive="nav-active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
          <span class="nav-icon">&#128236;</span>
          <span>Inbox</span>
        </a>
      </li>
      <li>
        <a routerLink="/webhooks" routerLinkActive="nav-active" class="nav-item">
          <span class="nav-icon">&#128279;</span>
          <span>Webhooks</span>
        </a>
      </li>
    </ul>

    <div class="sidebar-footer">
      <div class="server-status">
        <span class="status-dot"></span>
        <span class="status-label">localhost:5000</span>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <router-outlet />
  </main>
</div>
