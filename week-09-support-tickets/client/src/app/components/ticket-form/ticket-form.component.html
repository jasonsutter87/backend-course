<div class="page-header">
  <div class="header-content">
    <div>
      <h1>{{ isEditMode() ? 'Edit Ticket' : 'New Support Ticket' }}</h1>
      <p class="subtitle">{{ isEditMode() ? 'Update ticket information' : 'Submit a new issue for the support team' }}</p>
    </div>
    <a routerLink="/" class="btn btn-back">&#8592; Back to Tickets</a>
  </div>
</div>

<div class="page-body">
  <div *ngIf="loading()" class="state-message loading">
    <div class="spinner"></div> Loading ticket...
  </div>

  <div *ngIf="error()" class="alert alert-error">{{ error() }}</div>

  <form *ngIf="!loading()" [formGroup]="form" (ngSubmit)="onSubmit()" class="form-card" novalidate>

    <div class="form-group" [class.has-error]="fieldError('title')">
      <label for="title">Title <span class="required">*</span></label>
      <input id="title" type="text" formControlName="title" placeholder="Brief summary of the issue" />
      <span class="field-error" *ngIf="fieldError('title')">Title is required (min 5 characters).</span>
    </div>

    <div class="form-group" [class.has-error]="fieldError('description')">
      <label for="description">Description <span class="required">*</span></label>
      <textarea id="description" formControlName="description" rows="5" placeholder="Describe the issue in detail..."></textarea>
      <span class="field-error" *ngIf="fieldError('description')">Description is required (min 10 characters).</span>
    </div>

    <div class="form-row">
      <div class="form-group" [class.has-error]="fieldError('priority')">
        <label for="priority">Priority <span class="required">*</span></label>
        <select id="priority" formControlName="priority">
          <option *ngFor="let p of priorities" [value]="p.value">{{ p.label }}</option>
        </select>
      </div>

      <div class="form-group" *ngIf="isEditMode()">
        <label for="status">Status</label>
        <select id="status" formControlName="status">
          <option *ngFor="let s of statuses" [value]="s.value">{{ s.label }}</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="assignedTo">Assigned To <span class="optional">(optional)</span></label>
      <input id="assignedTo" type="text" formControlName="assignedTo" placeholder="Agent name..." />
    </div>

    <div class="form-actions">
      <a routerLink="/" class="btn btn-cancel">Cancel</a>
      <button type="submit" class="btn btn-submit" [disabled]="submitting()">
        {{ submitting() ? 'Saving...' : (isEditMode() ? 'Update Ticket' : 'Submit Ticket') }}
      </button>
    </div>
  </form>
</div>
