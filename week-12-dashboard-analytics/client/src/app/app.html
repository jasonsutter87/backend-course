<div class="app-shell">
  <nav class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">&#9636;</span>
      <span class="brand-name">Analytics</span>
    </div>

    <ul class="nav-list">
      <li>
        <a routerLink="/" routerLinkActive="nav-active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
          <span class="nav-icon">&#128202;</span>
          <span>Dashboard</span>
        </a>
      </li>
      <li>
        <a routerLink="/analytics" routerLinkActive="nav-active" class="nav-item">
          <span class="nav-icon">&#128200;</span>
          <span>Analytics</span>
        </a>
      </li>
      <li>
        <a routerLink="/widgets/add" routerLinkActive="nav-active" class="nav-item">
          <span class="nav-icon">+</span>
          <span>Add Widget</span>
        </a>
      </li>
    </ul>

    <div class="sidebar-footer">
      <div class="server-status">
        <span class="status-dot"></span>
        <span class="status-label">localhost:5000</span>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <router-outlet />
  </main>
</div>
